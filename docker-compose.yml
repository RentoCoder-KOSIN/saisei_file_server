services:

  file-server:
    build: ./server
    ports:
      - "4450:4450"
    volumes:
      - ./server/uploads:/app/uploads
      - db-data:/app
      - ./server/static:/app/static   # ← staticを直接マウント（再ビルド不要）
    environment:
      TASK_SERVER_URL: http://task-server:8000
    depends_on:
      - task-server
    restart: unless-stopped

  task-server:
    build: ./task-server
    ports:
      - "8000:8000"
    volumes:
      - db-data:/data
    environment:
      DB_PATH: /data/users.db
    restart: unless-stopped

volumes:
  db-data: