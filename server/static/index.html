<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyLab — Python課題研究ファイルサーバー</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

<!-- ══════════════════════════
     LOGIN SCREEN
══════════════════════════ -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">Py</div>
            <div class="logo-text">Py<span>Lab</span></div>
        </div>
        <p class="login-subtitle">// Python課題研究ファイルサーバー</p>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="login-username" placeholder="student_id or teacher"
                onkeydown="if(event.key==='Enter') login()" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••"
                onkeydown="if(event.key==='Enter') login()" />
        </div>
        <button class="login-btn" onclick="login()">ログイン →</button>
    </div>
</div>

<!-- ══════════════════════════
     MAIN APP
══════════════════════════ -->
<div id="app">
    <header>
        <div class="header-logo">
            <div class="logo-icon">Py</div>
            <div class="logo-name">Py<span>Lab</span></div>
        </div>
        <div class="header-status">
            <div class="status-dot"></div>
            server online
        </div>
        <div class="header-user">
            <span class="user-badge" id="user-badge">student</span>
            <button class="logout-btn" onclick="logout()">logout</button>
        </div>
    </header>

    <main>

        <!-- ユーザー管理（先生のみ） -->
        <div class="manage-section teacher-only-block">
            <div class="section-label">ユーザー管理</div>
            <div class="manage-card">
                <div class="form-row" style="margin-bottom:16px;">
                    <input type="text" id="new-username" placeholder="ユーザー名" />
                    <input type="password" id="new-password" placeholder="パスワード" />
                    <select id="new-role">
                        <option value="student">👨‍🎓 学生</option>
                        <option value="teacher">👨‍🏫 先生</option>
                    </select>
                    <button class="action-btn run" onclick="addUser()">＋ 追加</button>
                </div>
                <div id="user-list"></div>
            </div>
        </div>

        <!-- パスワード変更（全員） -->
        <div class="manage-section">
            <div class="section-label">パスワード変更</div>
            <div class="manage-card">
                <div class="form-row">
                    <input type="password" id="old-password" placeholder="現在のパスワード" />
                    <input type="password" id="new-passwd" placeholder="新しいパスワード" />
                    <button class="action-btn run" onclick="changePassword()">変更</button>
                </div>
            </div>
        </div>

        <!-- ══════════════════════════
             課題管理
        ══════════════════════════ -->

        <!-- 課題作成（先生のみ） -->
        <div class="manage-section teacher-only-block">
            <div class="section-label">課題作成</div>
            <div class="manage-card">
                <div class="form-row" style="flex-direction: column; align-items: stretch; gap: 12px;">
                    <div style="display:flex; gap:12px; flex-wrap:wrap;">
                        <input type="text" id="task-title" placeholder="課題タイトル" style="flex:2; min-width:200px;" />
                        <input type="datetime-local" id="task-deadline" style="flex:1; min-width:180px;" />
                    </div>
                    <div style="display:flex; gap:12px;">
                        <input type="text" id="task-desc" placeholder="課題の説明" style="flex:1;" />
                        <button class="action-btn run" onclick="createTask()" style="white-space:nowrap;">＋ 追加</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 遅延提出通知（先生のみ） -->
        <div class="manage-section teacher-only-block">
            <div class="section-label">⚠️ 遅延提出通知</div>
            <div class="manage-card">
                <div id="late-notifications">
                    <p class="notif-empty">// 遅延提出なし</p>
                </div>
            </div>
        </div>

        <!-- 課題一覧（全員） -->
        <div class="files-section" style="margin-bottom: 48px;">
            <div class="files-header">
                <div class="section-label" style="margin-bottom:0; flex:1">課題一覧</div>
                <div class="files-count">合計 <span id="task-count">0</span> 件</div>
            </div>
            <div class="file-list" id="task-list">
                <div class="empty-state">
                    <div class="empty-icon">📋</div>
                    <p>// まだ課題がありません</p>
                </div>
            </div>
        </div>

        <!-- Upload -->
        <div class="upload-section">
            <div class="section-label">ファイルアップロード</div>
            <!-- 課題選択（生徒用） -->
            <div class="manage-card" style="margin-bottom: 16px;">
                <div class="form-row">
                    <select id="upload-task-select" style="flex:1;">
                        <option value="">── 課題を選択（任意）──</option>
                    </select>
                </div>
            </div>
            <div class="drop-zone" id="drop-zone"
                ondragover="onDragOver(event)"
                ondragleave="onDragLeave(event)"
                ondrop="onDrop(event)"
                onclick="document.getElementById('file-input').click()">
                <span class="drop-icon">📂</span>
                <div class="drop-title">フォルダをドロップ</div>
                <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
                    ＋ フォルダを選択
                </button>
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-track">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-label" id="progress-label">アップロード中...</div>
                </div>
            </div>
            <input type="file" id="file-input"
                webkitdirectory multiple
                onchange="uploadFolder(this.files)">
        </div>

        <!-- File List -->
        <div class="files-section">
            <div class="files-header">
                <div class="section-label" style="margin-bottom:0; flex:1">アップロード済みファイル</div>
                <div class="files-count">合計 <span id="file-count">0</span> 件</div>
            </div>
            <div class="file-list" id="file-list">
                <div class="empty-state">
                    <div class="empty-icon">🗂️</div>
                    <p>// まだファイルがありません</p>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 提出状況モーダル（JS生成） -->

<script src="../static/app.js"></script>
</body>
</html>
